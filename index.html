<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Lightbot 3D</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #1e1e1e; color: white; overflow: hidden; }
        
        /* Top Bar */
        #top-bar { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 10px 20px; border-bottom: 2px solid #444; z-index: 10; }
        .bar-group { display: flex; align-items: center; gap: 15px; }
        button { background: #4caf50; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #45a049; }
        #btn-stop, #btn-home { background: #f44336; }
        #btn-stop:hover, #btn-home:hover { background: #d32f2f; }
        #speed-slider { vertical-align: middle; }

        /* Main Area */
        #main-area { display: flex; flex: 1; height: calc(100vh - 50px); position: relative; }
        
        /* Left Pane - Code Editor */
        #left-pane { width: 33.33%; min-width: 250px; max-width: 70%; resize: horizontal; overflow: hidden; display: flex; flex-direction: column; background: #282a36; border-right: 4px solid #444; }
        .editor-header { padding: 10px; background: #21222c; font-size: 14px; color: #f8f8f2; }
        #editor-container { flex: 1; overflow: auto; }
        .CodeMirror { height: 100% !important; font-size: 16px; }

        /* Right Pane - 3D View */
        #right-pane { flex: 1; position: relative; background: #87CEEB; }
        #canvas-container { width: 100%; height: 100%; display: block; }

        /* UI Overlays */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #2a2a2a; padding: 30px; border-radius: 8px; text-align: center; max-width: 600px; width: 90%; max-height: 90%; overflow-y: auto; }
        .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1px)); gap: 15px; margin-top: 20px; justify-content: center; }
        .level-card { background: #444; padding: 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .level-card:hover { background: #555; transform: scale(1.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="bar-group">
            <button id="btn-home">🏠 Menu</button>
            <span id="level-title">Level 1</span>
        </div>
        <div class="bar-group">
            <span>Lines: <span id="line-count">0</span></span>
            <span>Time: <span id="time-elapsed">0.0</span>s</span>
        </div>
        <div class="bar-group">
            <label for="speed-slider">Speed:</label>
            <input type="range" id="speed-slider" min="0.5" max="4" step="0.5" value="1">
            <span id="speed-display">1.0x</span>
            <button id="btn-play">▶ Play</button>
            <button id="btn-stop">⏹ Stop / Reset</button>
        </div>
    </div>

    <div id="main-area">
        <div id="left-pane">
            <div class="editor-header">Python Code | Medals - 🥇: <span id="gold-req"></span> 🥈: <span id="silver-req"></span> 🥉: <span id="bronze-req"></span></div>
            <div id="editor-container"></div>
        </div>
        <div id="right-pane">
            <div id="canvas-container"></div>
        </div>
    </div>

    <div id="menu-modal" class="modal-overlay">
        <div class="modal">
            <h2>Python Lightbot 3D</h2>
            <p>Select a level to begin</p>
            <div id="level-container" class="level-grid"></div>
            <br><br>
            <button onclick="clearSaveData()" style="background:#f44336; font-size:12px;">Clear All Save Data</button>
        </div>
    </div>

    <div id="win-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2>Level Complete! 🎉</h2>
            <p id="win-medal" style="font-size: 3rem; margin: 10px 0;">🥇</p>
            <p>Lines used: <span id="win-lines"></span></p>
            <p>Time: <span id="win-time"></span>s</p>
            <br>
            <button id="btn-next-level">Next Level</button>
            <button id="btn-close-win">Close</button>
        </div>
    </div>

<script>
// --- Game Data & Levels ---
const rawLevels = [
`Gold: 8
Silver: 4
Bronze: 2

Height map:
600000006
400000004
200000002
200000002
200060002
200000002
400000004
600000006

Item map:
000000000
0000P0000
0000L0000
000000000
000000000
000000000
0000L0000
000000000`
];

// --- Global Variables ---
let currentLevelIndex = 0;
let levelData = {};
let editor;
let isPlaying = false;
let commandQueue = [];
let savedData = JSON.parse(localStorage.getItem('lightbotSave')) || { levels: {} };
let timerInterval;
let timeElapsed = 0;
let isLevelActive = false;

// Three.js Variables
let scene, camera, renderer, controls;
let gridGroup, playerMesh;
let gridTiles = []; // To store tile objects for lighting
let lightsRemaining = 0;
let clock = new THREE.Clock();

// Player State
let playerState = {
    x: 0, z: 0, h: 0,
    dir: 2, // 0: +x(Right), 1: +z(Down), 2: -x(Left), 3: -z(Up)
    animating: false,
    animProgress: 0,
    currentAction: null,
    startX: 0, startZ: 0, startH: 0, startDir: 0,
    targetX: 0, targetZ: 0, targetH: 0, targetDir: 0
};

// --- Initialization ---
function init() {
    // Setup CodeMirror
    editor = CodeMirror(document.getElementById("editor-container"), {
        mode: "python",
        theme: "dracula",
        lineNumbers: true,
        indentUnit: 4,
        extraKeys: { "Tab": "indentMore", "Shift-Tab": "indentLess" }
    });

    editor.on("change", updateLineCount);

    // Setup UI Listeners
    document.getElementById("btn-play").addEventListener("click", playCode);
    document.getElementById("btn-stop").addEventListener("click", resetLevel);
    document.getElementById("btn-home").addEventListener("click", showMenu);
    document.getElementById("btn-close-win").addEventListener("click", () => document.getElementById("win-modal").classList.add("hidden"));
    document.getElementById("btn-next-level").addEventListener("click", () => {
        document.getElementById("win-modal").classList.add("hidden");
        loadLevel(currentLevelIndex + 1);
    });
    document.getElementById("speed-slider").addEventListener("input", (e) => {
        document.getElementById("speed-display").innerText = parseFloat(e.target.value).toFixed(1) + "x";
    });

    // Resize handler for Three.js
    new ResizeObserver(resizeCanvas).observe(document.getElementById('right-pane'));

    initThreeJS();
    buildMenu();
}

// --- Level Parsing ---
function parseLevelString(str) {
    const lines = str.split('\n').map(l => l.trim());
    let data = { gold: 0, silver: 0, bronze: 0, height: [], items: [], startX: 0, startZ: 0, startH: 0 };
    
    let mode = 'meta';
    for (let line of lines) {
        if (line === '') continue;
        if (line.startsWith('Height map:')) { mode = 'height'; continue; }
        if (line.startsWith('Item map:')) { mode = 'items'; continue; }

        if (mode === 'meta') {
            if (line.startsWith('Gold:')) data.gold = parseInt(line.split(':')[1]);
            if (line.startsWith('Silver:')) data.silver = parseInt(line.split(':')[1]);
            if (line.startsWith('Bronze:')) data.bronze = parseInt(line.split(':')[1]);
        } else if (mode === 'height') {
            data.height.push(line.split('').map(Number));
        } else if (mode === 'items') {
            let row = line.split('');
            data.items.push(row);
            let pIndex = row.indexOf('P');
            if (pIndex !== -1) {
                data.startX = pIndex;
                data.startZ = data.items.length - 1;
            }
        }
    }
    data.startH = data.height[data.startZ][data.startX];
    return data;
}

// --- Menu & Storage ---
function buildMenu() {
    const container = document.getElementById('level-container');
    container.innerHTML = '';
    rawLevels.forEach((level, index) => {
        const parsed = parseLevelString(level);
        const saved = savedData.levels[index] || {};
        const div = document.createElement('div');
        div.className = 'level-card';
        div.innerHTML = `
            <h3>Level ${index + 1}</h3>
            <p>${saved.medal || '❌'}</p>
            <p style="font-size:12px">Lines: ${saved.lines || '-'}</p>
        `;
        div.onclick = () => { loadLevel(index); document.getElementById('menu-modal').classList.add('hidden'); };
        container.appendChild(div);
    });
}

function showMenu() {
    resetLevel();
    saveCurrentCode();
    isLevelActive = false; // We are returning to the menu
    document.getElementById('menu-modal').classList.remove('hidden');
    buildMenu();
}

function clearSaveData() {
    if(confirm("Are you sure? This will delete all progress and code.")) {
        localStorage.removeItem('lightbotSave');
        savedData = { levels: {} };
        buildMenu();
    }
}

function saveCurrentCode() {
    if (!isLevelActive) return; // Prevent overwriting saves when in the menu
    
    if (!savedData.levels[currentLevelIndex]) savedData.levels[currentLevelIndex] = {};
    savedData.levels[currentLevelIndex].code = editor.getValue();
    localStorage.setItem('lightbotSave', JSON.stringify(savedData));
}

// --- Level Logic ---
function loadLevel(index) {
    if (index >= rawLevels.length) {
        alert("You finished all available levels!");
        showMenu();
        return;
    }
    
    saveCurrentCode(); // Safely saves previous level if one was active
    
    currentLevelIndex = index;
    isLevelActive = true; // Mark as active so future saves work
    
    levelData = parseLevelString(rawLevels[index]);
    
    document.getElementById("level-title").innerText = `Level ${index + 1}`;
    document.getElementById("gold-req").innerText = levelData.gold;
    document.getElementById("silver-req").innerText = levelData.silver;
    document.getElementById("bronze-req").innerText = levelData.bronze;

    // Load saved code
    const saved = savedData.levels[index] || {};
    editor.setValue(saved.code || "");
    updateLineCount();

    build3DLevel();
    resetLevel();
}

function updateLineCount() {
    const code = editor.getValue();
    // Count non-empty lines, ignoring comments (simplistic count for medals)
    const lines = code.split('\n').filter(l => l.trim() !== '' && !l.trim().startsWith('#')).length;
    document.getElementById("line-count").innerText = lines;
    return lines;
}

// --- Three.js Setup & Building ---
function initThreeJS() {
    const container = document.getElementById("canvas-container");
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky blue

    camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    gridGroup = new THREE.Group();
    scene.add(gridGroup);

    // Player Mesh
    playerMesh = new THREE.Group();
    const bodyGeo = new THREE.CylinderGeometry(0.3, 0.4, 0.8, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4caf50 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.4;
    body.castShadow = true;
    
    // Face indicator (to show direction)
    const faceGeo = new THREE.BoxGeometry(0.4, 0.2, 0.2);
    const faceMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const face = new THREE.Mesh(faceGeo, faceMat);
    face.position.set(0, 0.6, 0.3); // Facing +Z initially

    playerMesh.add(body);
    playerMesh.add(face);
    scene.add(playerMesh);

    requestAnimationFrame(animate);
}

function build3DLevel() {
    while(gridGroup.children.length > 0){ gridGroup.remove(gridGroup.children[0]); }
    gridTiles = [];
    lightsRemaining = 0;

    const heightScale = 0.5;
    const boxGeo = new THREE.BoxGeometry(1, heightScale, 1);
    const edgesGeo = new THREE.EdgesGeometry(boxGeo); // Creates the outline geometry

    // Base materials
    const normalMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
    const lightOffMat = new THREE.MeshStandardMaterial({ color: 0x0055ff }); 
    
    // Edge materials
    const edgeGrey = new THREE.LineBasicMaterial({ color: 0x555555 });
    const edgeDarkBlue = new THREE.LineBasicMaterial({ color: 0x0000aa });
    
    const h = levelData.height;
    const items = levelData.items;
    const rows = h.length;
    const cols = h[0].length;

    const offsetX = -cols / 2 + 0.5;
    const offsetZ = -rows / 2 + 0.5;

    for (let z = 0; z < rows; z++) {
        gridTiles[z] = [];
        for (let x = 0; x < cols; x++) {
            gridTiles[z][x] = { height: h[z][x], item: items[z][x], isLit: false, meshes: [] };
            
            let height = h[z][x];

            for (let y = 0; y <= height; y++) {
                let isTop = (y === height);
                let mat = normalMat;
                let edgeMat = edgeGrey;
                
                if (isTop && items[z][x] === 'L') {
                    mat = lightOffMat;
                    edgeMat = edgeDarkBlue;
                    lightsRemaining++;
                }

                let mesh = new THREE.Mesh(boxGeo, mat);
                mesh.position.set(x + offsetX, (y * heightScale) - (heightScale / 2), z + offsetZ);
                mesh.scale.set(0.95, 1, 0.95);
                mesh.receiveShadow = true;
                mesh.castShadow = true;

                // Add the outline to the mesh
                let edges = new THREE.LineSegments(edgesGeo, edgeMat);
                mesh.add(edges);

                gridGroup.add(mesh);
                gridTiles[z][x].meshes.push(mesh);
            }
        }
    }

    camera.position.set(0, 10, 15);
    camera.lookAt(0, 0, 0);
    controls.target.set(0, 0, 0);
    controls.update();
}

function resizeCanvas() {
    const container = document.getElementById("canvas-container");
    if(camera && renderer) {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }
}

// --- Game Logic & Python Bridge ---

function resetLevel() {
    isPlaying = false;
    commandQueue = [];
    clearInterval(timerInterval);
    timeElapsed = 0;
    document.getElementById("time-elapsed").innerText = "0.0";
    
    // Reset Player
    playerState.x = levelData.startX;
    playerState.z = levelData.startZ;
    playerState.h = levelData.startH;
    playerState.dir = 1; 
    playerState.animating = false;
    playerState.currentAction = null;
    
    updatePlayerTransform(true);

    // Reset Lights
    lightsRemaining = 0;
    const lightOffMat = new THREE.MeshStandardMaterial({ color: 0x0055ff });
    for (let z = 0; z < levelData.height.length; z++) {
        for (let x = 0; x < levelData.height[0].length; x++) {
            let tile = gridTiles[z][x];
            tile.isLit = false;
            if (tile.item === 'L' && tile.meshes.length > 0) {
                let topMesh = tile.meshes[tile.meshes.length - 1];
                topMesh.material = lightOffMat;
                
                // Reset edge outline
                let edges = topMesh.children.find(c => c.type === 'LineSegments');
                if (edges) edges.material = new THREE.LineBasicMaterial({ color: 0x0000aa });

                // Remove point light
                let pLight = topMesh.children.find(c => c.type === 'PointLight');
                if(pLight) topMesh.remove(pLight);
                
                lightsRemaining++;
            }
        }
    }
}

function updatePlayerTransform(instant = false) {
    const heightScale = 0.5;
    const cols = levelData.height[0].length;
    const rows = levelData.height.length;
    const offsetX = -cols / 2 + 0.5;
    const offsetZ = -rows / 2 + 0.5;

    let targetWorldX = playerState.x + offsetX;
    let targetWorldZ = playerState.z + offsetZ;
    let targetWorldY = playerState.h * heightScale; // Scaled height
    
    // Rotation logic
    let targetRotY = 0;
    if (playerState.dir === 0) targetRotY = Math.PI / 2;
    else if (playerState.dir === 1) targetRotY = 0;
    else if (playerState.dir === 2) targetRotY = -Math.PI / 2;
    else if (playerState.dir === 3) targetRotY = Math.PI;

    if (instant) {
        playerMesh.position.set(targetWorldX, targetWorldY, targetWorldZ);
        playerMesh.rotation.y = targetRotY;
    }
}

// Skulpt setup
function outf(text) { console.log(text); }
function builtinRead(x) {
    if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
            throw "File not found: '" + x + "'";
    return Sk.builtinFiles["files"][x];
}

function playCode() {
    if (isPlaying) return;
    resetLevel();
    saveCurrentCode();
    
    const prog = editor.getValue();
    Sk.configure({ output: outf, read: builtinRead });
    
    // Inject custom functions
    Sk.builtins.walk_forward = new Sk.builtin.func(() => { commandQueue.push('walk_forward'); });
    Sk.builtins.turn_right = new Sk.builtin.func(() => { commandQueue.push('turn_right'); });
    Sk.builtins.turn_left = new Sk.builtin.func(() => { commandQueue.push('turn_left'); });
    Sk.builtins.jump = new Sk.builtin.func(() => { commandQueue.push('jump'); });
    Sk.builtins.light = new Sk.builtin.func(() => { commandQueue.push('light'); });

    try {
        Sk.misceval.asyncToPromise(() => Sk.importMainWithBody("<stdin>", false, prog, true))
        .then(() => {
            // Code execution finished instantly, commands are queued.
            isPlaying = true;
            timerInterval = setInterval(() => {
                timeElapsed += 0.1;
                document.getElementById("time-elapsed").innerText = timeElapsed.toFixed(1);
            }, 100);
        })
        .catch(err => {
            alert(err.toString());
        });
    } catch (e) {
        alert(e.toString());
    }
}

// --- Animation Loop ---
function animate() {
    requestAnimationFrame(animate);
    let dt = clock.getDelta();
    
    if (isPlaying) {
        const speedMultiplier = parseFloat(document.getElementById("speed-slider").value);
        
        if (!playerState.animating && commandQueue.length > 0) {
            startAction(commandQueue.shift());
        } else if (!playerState.animating && commandQueue.length === 0) {
            // Finished queue, check win
            isPlaying = false;
            clearInterval(timerInterval);
            if (lightsRemaining === 0 && levelData.items.flat().includes('L')) {
                handleWin();
            } else {
                // Failed (ran out of commands)
            }
        }

        if (playerState.animating) {
            playerState.animProgress += dt * speedMultiplier; // 1 second base duration
            if (playerState.animProgress >= 1.0) {
                playerState.animProgress = 1.0;
                playerState.animating = false;
                applyActionFinal();
            }
            applyAnimationState();
        }
    }
    
    controls.update();
    renderer.render(scene, camera);
}

// --- Action Logic ---
function getForwardCoords() {
    let nx = playerState.x;
    let nz = playerState.z;
    if (playerState.dir === 0) nx++;
    if (playerState.dir === 1) nz++;
    if (playerState.dir === 2) nx--;
    if (playerState.dir === 3) nz--;
    return { x: nx, z: nz };
}

function isValidTile(x, z) {
    return x >= 0 && x < levelData.height[0].length && z >= 0 && z < levelData.height.length;
}

function startAction(action) {
    playerState.currentAction = action;
    playerState.animating = true;
    playerState.animProgress = 0;
    
    playerState.startX = playerState.x;
    playerState.startZ = playerState.z;
    playerState.startH = playerState.h;
    playerState.startDir = playerState.dir;
    
    playerState.targetX = playerState.x;
    playerState.targetZ = playerState.z;
    playerState.targetH = playerState.h;
    playerState.targetDir = playerState.dir;

    const fwd = getForwardCoords();

    switch(action) {
        case 'walk_forward':
            if (isValidTile(fwd.x, fwd.z)) {
                let targetH = levelData.height[fwd.z][fwd.x];
                if (targetH === playerState.h) {
                    playerState.targetX = fwd.x;
                    playerState.targetZ = fwd.z;
                }
            }
            break;
        case 'jump':
            if (isValidTile(fwd.x, fwd.z)) {
                let targetH = levelData.height[fwd.z][fwd.x];
                if (Math.abs(targetH - playerState.h) === 1) { // Exactly 1 difference
                    playerState.targetX = fwd.x;
                    playerState.targetZ = fwd.z;
                    playerState.targetH = targetH;
                }
            }
            break;
        case 'turn_right':
            playerState.targetDir = (playerState.dir + 1) % 4; // Right turn
            break;
        case 'turn_left':
            playerState.targetDir = (playerState.dir + 3) % 4; // Left turn
            break;
        case 'light':
            // Animation runs in place, final effect applied at end
            break;
    }
}

function applyAnimationState() {
    const heightScale = 0.5;
    let p = playerState.animProgress;
    let ease = p; 
    
    const cols = levelData.height[0].length;
    const rows = levelData.height.length;
    const offsetX = -cols / 2 + 0.5;
    const offsetZ = -rows / 2 + 0.5;

    // Position lerp
    let curX = playerState.startX + (playerState.targetX - playerState.startX) * ease;
    let curZ = playerState.startZ + (playerState.targetZ - playerState.startZ) * ease;
    
    // Lerp logical height, then scale for rendering
    let logicalH = playerState.startH + (playerState.targetH - playerState.startH) * ease;
    let curH = logicalH * heightScale; 
    
    // Jump arc
    if (playerState.currentAction === 'jump' && (playerState.targetX !== playerState.startX || playerState.targetZ !== playerState.startZ)) {
        curH += Math.sin(p * Math.PI) * (1.0 * heightScale); // Arc scaled to match visuals
    }
    
    playerMesh.position.set(curX + offsetX, curH, curZ + offsetZ);

    // Rotation lerp
    let startRot = getRotationForDir(playerState.startDir);
    let targetRot = getRotationForDir(playerState.targetDir);
    
    if (Math.abs(targetRot - startRot) > Math.PI) {
        if (targetRot > startRot) startRot += Math.PI * 2;
        else targetRot += Math.PI * 2;
    }
    
    playerMesh.rotation.y = startRot + (targetRot - startRot) * ease;
}

function applyActionFinal() {
    playerState.x = playerState.targetX;
    playerState.z = playerState.targetZ;
    playerState.h = playerState.targetH;
    playerState.dir = playerState.targetDir;
    
    if (playerState.currentAction === 'light') {
        let tile = gridTiles[playerState.z][playerState.x];
        if (tile.item === 'L') {
            tile.isLit = !tile.isLit;
            let topMesh = tile.meshes[tile.meshes.length - 1];
            
            // Find the edges child object
            let edges = topMesh.children.find(c => c.type === 'LineSegments');

            if (tile.isLit) {
                topMesh.material = new THREE.MeshStandardMaterial({ color: 0xffff99 }); // Light yellow
                if (edges) edges.material = new THREE.LineBasicMaterial({ color: 0xccaa00 }); // Dark yellow

                let pLight = new THREE.PointLight(0xffffaa, 1, 2);
                pLight.position.set(0, 0.5, 0);
                topMesh.add(pLight);
                lightsRemaining--;
            } else {
                topMesh.material = new THREE.MeshStandardMaterial({ color: 0x0055ff }); // Off blue
                if (edges) edges.material = new THREE.LineBasicMaterial({ color: 0x0000aa }); // Dark blue
                
                // Specifically find and remove the point light (so we don't accidentally remove the outline)
                let pLight = topMesh.children.find(c => c.type === 'PointLight');
                if(pLight) topMesh.remove(pLight);
                
                lightsRemaining++;
            }
        }
    }
    updatePlayerTransform(true);
}

function getRotationForDir(dir) {
    if (dir === 0) return Math.PI / 2;
    if (dir === 1) return 0;
    if (dir === 2) return -Math.PI / 2;
    return Math.PI; // dir 3
}

function handleWin() {
    const linesUsed = updateLineCount();
    let medal = '🤷‍♂️';
    if (linesUsed <= levelData.gold) medal = '🥇';
    else if (linesUsed <= levelData.silver) medal = '🥈';
    else if (linesUsed <= levelData.bronze) medal = '🥉';
    
    document.getElementById("win-medal").innerText = medal;
    document.getElementById("win-lines").innerText = linesUsed;
    document.getElementById("win-time").innerText = timeElapsed.toFixed(1);
    document.getElementById("win-modal").classList.remove("hidden");

    // Save progress
    if (!savedData.levels[currentLevelIndex]) savedData.levels[currentLevelIndex] = {};
    savedData.levels[currentLevelIndex].lines = linesUsed;
    savedData.levels[currentLevelIndex].medal = medal;
    localStorage.setItem('lightbotSave', JSON.stringify(savedData));
}

// Start
window.onload = init;

</script>
